{% extends 'base.html' %}

{% block content %}
  {% if posts|length == 0 %}
    <p>Sem notícias ainda.</p>
  {% endif %}
  {% for post in posts %}
    <div class="forum-post">
      <div class="post-left">
        <div class="avatar">K</div>
        <div class="user">Kaiser</div>
      </div>
      <div class="post-right">
        <div class="post-head">
          <div class="post-title"><a href="posts/{{ post.slug }}.html" class="post-link">{{ post.meta.title }}</a></div>
          <div class="post-meta">#{{ post.id }} • {{ post.meta.date }}</div>
        </div>
        <div class="post-body">
          {% if post.meta.image %}
            <img class="post-image" src="{{ post.meta.image }}" alt="imagem">
          {% endif %}
          <div class="post-text">{{ post.html | safe }}</div>
        </div>
      </div>
    </div>
  {% endfor %}
{% endblock %}
