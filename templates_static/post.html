{% extends 'base.html' %}

{% block content %}
  <div class="forum-post">
    <div class="post-left">
      <div class="avatar">K</div>
      <div class="user">Kaiser</div>
    </div>
    <div class="post-right">
      <div class="post-head">
        <div class="post-title">{{ post.meta.title }}</div>
        <div class="post-meta">#{{ post.id }} • {{ post.meta.date }}</div>
      </div>
      <div class="post-body">
        {% if post.meta.image %}
          <img class="post-image" src="{{ post.meta.image }}" alt="imagem">
        {% endif %}
        <div class="post-text">{{ post.html | safe }}</div>
      </div>
    </div>
  </div>
  <p><a href="{{ home_url }}" class="post-link">&laquo; Voltar</a></p>
{% endblock %}
